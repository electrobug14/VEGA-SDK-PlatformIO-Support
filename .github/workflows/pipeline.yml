name: VEGA Makefile Build Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Security Check
        run: |
          sudo apt-get install -y cppcheck
          cppcheck --enable=all --error-exitcode=1 src/

      - name: 3. Setup Official VEGA Tools
        run: |
          sudo git clone https://gitlab.com/riscv-vega/community/vega-sdk.git /opt/vega-sdk
          sudo git clone https://gitlab.com/riscv-vega/community/vega-tools-rv32.git /opt/vega-tools
          echo "/opt/vega-tools/bin" >> $GITHUB_PATH

      - name: 4. Build All Projects via Makefile
        run: make SDK_PATH=/opt/vega-sdk
        
      - name: 5. Store Executables as Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: compiled-binaries
          # This captures every .bin, .elf, and .hex inside your src subfolders
          path: src/**/*.bin
          
      # Environment is wiped automatically by GitHub after this step.
